<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--bg-card);
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 500;
      background: var(--bg-card);
    }

    .status-badge.running {
      background: var(--success);
      color: white;
    }

    .status-badge.stopped {
      background: var(--error);
      color: white;
    }

    .grid {
      display: grid;
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 20px;
    }

    .status-grid {
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 600;
    }

    .logs {
      max-height: 400px;
      overflow-y: auto;
    }

    .log-line {
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--bg-card);
    }

    .log-line:last-child {
      border-bottom: none;
    }

    .log-line .timestamp {
      color: var(--text-secondary);
      margin-right: 8px;
    }

    .log-line .level {
      margin-right: 8px;
      font-weight: 500;
    }

    .log-line .level.INFO { color: var(--accent); }
    .log-line .level.WARN { color: var(--warning); }
    .log-line .level.ERROR,
    .log-line .level.FATAL { color: var(--error); }

    .log-line .message {
      color: var(--text-primary);
    }

    .button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--accent);
      color: white;
    }

    .button:hover {
      background: var(--accent-hover);
    }

    .button.secondary {
      background: var(--bg-card);
    }

    .button.secondary:hover {
      background: var(--bg-secondary);
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .error-message {
      background: var(--error);
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .last-update {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: right;
      margin-bottom: 16px;
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>OpenClaw Monitor</h1>
      <span id="statusBadge" class="status-badge">加载中...</span>
    </div>

    <div class="last-update" id="lastUpdate">最后更新: --</div>

    <div id="error" class="error-message" style="display: none;"></div>

    <div class="grid status-grid">
      <div class="card stat">
        <span class="stat-label">状态</span>
        <span class="stat-value" id="running">--</span>
      </div>
      <div class="card stat">
        <span class="stat-label">PID</span>
        <span class="stat-value" id="pid">--</span>
      </div>
      <div class="card stat">
        <span class="stat-label">CPU</span>
        <span class="stat-value" id="cpu">--</span>
      </div>
      <div class="card stat">
        <span class="stat-label">内存</span>
        <span class="stat-value" id="memory">--</span>
      </div>
      <div class="card stat">
        <span class="stat-label">运行时长</span>
        <span class="stat-value" id="uptime">--</span>
      </div>
      <div class="card stat">
        <span class="stat-label">端口</span>
        <span class="stat-value" id="port">--</span>
      </div>
    </div>

    <div class="buttons">
      <button class="button" onclick="refresh()">刷新状态</button>
    </div>

    <div class="card logs">
      <h3 style="margin-bottom: 16px;">最近日志</h3>
      <div id="logs">加载中...</div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let ws = null;

    function formatUptime(seconds) {
      if (!seconds) return '--';
      const days = Math.floor(seconds / 86400);
      const hours = Math.floor((seconds % 86400) / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      return days > 0 ? `${days}天${hours}小时` : `${hours}小时${minutes}分`;
    }

    function updateLastUpdate() {
      document.getElementById('lastUpdate').textContent =
        '最后更新: ' + new Date().toLocaleString('zh-CN');
    }

    function showError(message) {
      const el = document.getElementById('error');
      el.textContent = message;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    async function fetchStatus() {
      try {
        const res = await fetch(`${API_BASE}/status`);
        if (!res.ok) {
          throw new Error('Failed to fetch status');
        }
        const data = await res.json();
        renderStatus(data);
      } catch (error) {
        showError('无法连接到监控服务');
        console.error(error);
      }
    }

    function renderStatus(data) {
      const badge = document.getElementById('statusBadge');
      const running = document.getElementById('running');
      const pid = document.getElementById('pid');
      const cpu = document.getElementById('cpu');
      const memory = document.getElementById('memory');
      const uptime = document.getElementById('uptime');
      const port = document.getElementById('port');

      if (data.running) {
        badge.textContent = '运行中';
        badge.className = 'status-badge running';
        running.textContent = '✓ 运行中';
        pid.textContent = data.pid || '--';
        cpu.textContent = data.cpuPercent.toFixed(1) + '%';
        memory.textContent = data.memoryMB.toFixed(0) + ' MB';
        uptime.textContent = formatUptime(data.uptime);
        port.textContent = data.portOpen ? data.port || '--' : '关闭';
      } else {
        badge.textContent = '已停止';
        badge.className = 'status-badge stopped';
        running.textContent = '✗ 已停止';
        pid.textContent = '--';
        cpu.textContent = '--';
        memory.textContent = '--';
        uptime.textContent = '--';
        port.textContent = '--';
      }

      updateLastUpdate();
    }

    async function fetchLogs() {
      try {
        const res = await fetch(`${API_BASE}/logs?n=50`);
        if (!res.ok) return;
        const logs = await res.json();
        renderLogs(logs);
      } catch (error) {
        console.error('Failed to fetch logs:', error);
      }
    }

    function renderLogs(logs) {
      const container = document.getElementById('logs');
      if (logs.length === 0) {
        container.textContent = '暂无日志';
        return;
      }

      container.innerHTML = logs.map(log => `
        <div class="log-line">
          <span class="timestamp">[${new Date(log.timestamp).toLocaleTimeString('zh-CN')}]</span>
          <span class="level ${log.level}">[${log.level}]</span>
          <span class="message">${escapeHtml(log.message)}</span>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function refresh() {
      fetchStatus();
      fetchLogs();
    }

    function connectEvents() {
      const wsUrl = `ws://${location.host}/api/events`;
      ws = new WebSocket(wsUrl);

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'status') {
          renderStatus(data.data);
        }
      };

      ws.onclose = () => {
        console.log('WebSocket disconnected, reconnecting...');
        setTimeout(connectEvents, 5000);
      };

      ws.onerror = () => {
        console.log('WebSocket error');
      };
    }

    // 初始化
    refresh();
    fetchLogs();
    connectEvents();

    // 定期刷新（作为 WebSocket 的备用）
    setInterval(refresh, 30000);
  </script>
</body>
</html>
